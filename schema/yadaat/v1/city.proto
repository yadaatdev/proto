syntax = "proto3";

package yadaat.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";

message City {
  option (google.api.resource) = {
    type: "yadaat.com/City"
    pattern: "cities/{city}"
  };
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];
  string display_name = 2;
}

message GetCityRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "yadaat.com/City"}
  ];
}

message ListCitiesRequest {
  // The maximum number of cities to return. The service may return fewer than
  // this value.
  // If unspecified, at most 50 cities will be returned.
  // The maximum value is 1000; values above 1000 will be coerced to 1000.
  int32 page_size = 1;

  // A page token, received from a previous `ListCities` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListCities` must match
  // the call that provided the page token.
  string page_token = 2;
}

message ListCitiesResponse {
  // The cities.
  repeated City cities = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

message CreateCityRequest {
  // The city to create
  City city = 1 [(google.api.field_behavior) = REQUIRED];
}

message UpdateCityRequest {
  // The city to update.
  //
  // The city's `name` field is used to identify the city to update.
  // Format: cities/{city}
  City city = 1 [(google.api.field_behavior) = REQUIRED];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2;
}

message DeleteCityRequest {
  // The name of the city to delete.
  // Format: cities/{city}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "yadaat.com/City"}
  ];
}
