syntax = "proto3";

package yadaat.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";

message Subject {
  option (google.api.resource) = {
    type: "yadaat.com/Subject"
    pattern: "subjects/{subject}"
  };
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];
  string display_name = 2;
}

message GetSubjectRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "yadaat.com/Subject"}
  ];
}

message ListSubjectsRequest {
  // The maximum number of subjects to return. The service may return fewer than
  // this value.
  // If unspecified, at most 50 subjects will be returned.
  // The maximum value is 1000; values above 1000 will be coerced to 1000.
  int32 page_size = 1;

  // A page token, received from a previous `ListSubjects` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListSubjects` must match
  // the call that provided the page token.
  string page_token = 2;
}

message ListSubjectsResponse {
  // The subjects.
  repeated Subject subjects = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

message CreateSubjectRequest {
  // The subject to create
  Subject subject = 1 [(google.api.field_behavior) = REQUIRED];
}

message UpdateSubjectRequest {
  // The subject to update.
  //
  // The subject's `name` field is used to identify the subject to update.
  // Format: subjects/{subject}
  Subject subject = 1 [(google.api.field_behavior) = REQUIRED];

  // The list of fields to update.
  google.protobuf.FieldMask update_mask = 2;
}

message DeleteSubjectRequest {
  // The name of the subject to delete.
  // Format: subjects/{subject}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "yadaat.com/Subject"}
  ];
}
