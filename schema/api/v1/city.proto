syntax = "proto3";

package api.v1;

import "api/v1/common.proto";

message City {
  string id = 1;
  string name = 2;
}

message GetCityRequest {
  string id = 1;
}

message GetCityResponse {
  City city = 1;
}

message CreateCityRequest {
  string name = 1;
}

message CreateCityResponse {
  City city = 1;
}

message UpdateCityRequest {
  string id = 1;
  string name = 2;
}

message UpdateCityResponse {
  City city = 1;
}

message DeleteCityRequest {
  string id = 1;
}

message DeleteCityResponse {}

message ListCityRequest {}

message ListCityResponse {
  repeated Option options = 1;
}

service CityService {
  rpc Get(GetCityRequest) returns (GetCityResponse);
  rpc Create(CreateCityRequest) returns (CreateCityResponse);
  rpc Update(UpdateCityRequest) returns (UpdateCityResponse);
  rpc Delete(DeleteCityRequest) returns (DeleteCityResponse);
  rpc List(ListCityRequest) returns (ListCityResponse);
}
