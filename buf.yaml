# For details on buf.yaml configuration, visit https://buf.build/docs/configuration/v2/buf-yaml
version: v2
modules:
  - path: schema
lint:
  use:
    - STANDARD
  # We name RPC types <Rpc><Entity>{Request,Response} (e.g. GetCityRequest) so
  # messages stay unique across the shared api.v1 package; this differs from the
  # buf-standard <Rpc>{Request,Response} naming.
  except:
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
